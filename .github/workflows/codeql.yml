name: codeql

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f25eda876ebb741d872b63b9f2c6dfdd77f14b83
        with:
          languages: csharp

      - name: Autobuild
        uses: github/codeql-action/autobuild@f25eda876ebb741d872b63b9f2c6dfdd77f14b83

      - name: Analyze
        uses: github/codeql-action/analyze@f25eda876ebb741d872b63b9f2c6dfdd77f14b83
