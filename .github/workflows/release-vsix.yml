name: release-vsix

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: "10.0.x"

      - name: Build VSIX release artifact
        shell: pwsh
        run: .\scripts\build-release.ps1

      - name: Resolve release VSIX path
        id: resolve_vsix
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -LiteralPath artifacts\release -Filter *.vsix | Select-Object -First 1
          if ($null -eq $vsix) {
            throw "Release VSIX asset was not found."
          }
          "path=$($vsix.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate artifact attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-path: ${{ steps.resolve_vsix.outputs.path }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: re-code-release
          path: artifacts/release/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: |
            ${{ steps.resolve_vsix.outputs.path }}
            artifacts/release/SHA256SUMS.txt
            artifacts/release/release-notes.md
