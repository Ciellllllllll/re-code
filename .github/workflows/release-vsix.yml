name: release-vsix

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: "10.0.x"

      - name: Build VSIX release artifact
        shell: pwsh
        run: .\scripts\build-release.ps1

      - name: Resolve release VSIX path
        id: resolve_vsix
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -LiteralPath artifacts\release -Filter *.vsix | Select-Object -First 1
          if ($null -eq $vsix) {
            throw "Release VSIX asset was not found."
          }
          "path=$($vsix.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: ${{ steps.resolve_vsix.outputs.path }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: re-code-release
          path: artifacts/release/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            ${{ steps.resolve_vsix.outputs.path }}
            artifacts/release/SHA256SUMS.txt
            artifacts/release/release-notes.md
